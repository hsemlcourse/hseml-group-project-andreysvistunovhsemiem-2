# docker-compose.yml — обучение, тюнинг, тесты, FastAPI и Streamlit.
# Данные/модели монтируются из хоста, чтобы артефакты не пропали с контейнером.
services:
  train:
    build: .
    image: credit-default:latest
    container_name: credit-default-train
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./report:/app/report
    command: ["python", "-m", "src.modeling"]

  tune:
    build: .
    image: credit-default:latest
    container_name: credit-default-tune
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./report:/app/report
    command: ["python", "-m", "src.tuning"]

  finalize:
    build: .
    image: credit-default:latest
    container_name: credit-default-finalize
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["python", "-m", "src.finalize"]

  api:
    build: .
    image: credit-default:latest
    container_name: credit-default-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    command: ["uvicorn", "src.api:app", "--host", "0.0.0.0", "--port", "8000"]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 10s
      timeout: 3s
      retries: 5

  ui:
    build: .
    image: credit-default:latest
    container_name: credit-default-ui
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    volumes:
      - ./models:/app/models
    depends_on:
      api:
        condition: service_healthy
    command:
      [
        "streamlit",
        "run",
        "src/ui.py",
        "--server.address",
        "0.0.0.0",
        "--server.port",
        "8501",
        "--server.headless",
        "true",
      ]

  test:
    build: .
    image: credit-default:latest
    container_name: credit-default-test
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    command: ["python", "-m", "pytest", "-q"]
